name: Task
description: Implementation task for GoldenMCP
title: "Task: "
labels:
  - P0
body:
  - type: dropdown
    id: epic
    attributes:
      label: Epic
      description: Also add the matching epic/* label after creating the issue
      options:
        - epic/infra
        - epic/eval
        - epic/walrus
        - epic/web
        - epic/identity
        - epic/chainlink
        - epic/marketplace
    validations:
      required: true
  - type: dropdown
    id: estimate
    attributes:
      label: Estimate
      description: Also add the matching estimate:* label after creating the issue
      options:
        - estimate:1h
        - estimate:2h
        - estimate:3h
        - estimate:4h
    validations:
      required: true
  - type: input
    id: assignee_skill
    attributes:
      label: Assignee skill
      placeholder: Python, TypeScript, Solidity, DevOps
    validations:
      required: true
  - type: textarea
    id: acceptance_tests
    attributes:
      label: Acceptance tests
      description: Commands and criteria that must pass before close
    validations:
      required: true
  - type: textarea
    id: blocked_by
    attributes:
      label: Blocked by
      description: GitHub issue numbers (e.g. GH #5, GH #11) or external dependencies
  - type: input
    id: plan_reference
    attributes:
      label: Plan reference
      placeholder: "GoldenMCP eval marketplace — issue #40"
  - type: textarea
    id: description
    attributes:
      label: Description
    validations:
      required: true
