name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --all-packages
      - run: uv run pytest packages/ -v --ignore=packages/inspect-web3/tests/test_integration_live.py

  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
      - run: cd contracts/mcp-registry && forge test

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: cd apps/web && bun install && bun test

  web-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: cd apps/web && bun install && bun run test:e2e:install
      - name: Playwright E2E
        env:
          NEXT_PUBLIC_ARC_RPC_URL: ${{ secrets.NEXT_PUBLIC_ARC_RPC_URL }}
          NEXT_PUBLIC_REGISTRY_ADDRESS: ${{ secrets.NEXT_PUBLIC_REGISTRY_ADDRESS }}
          NEXT_PUBLIC_WALRUS_AGGREGATOR_URL: ${{ secrets.NEXT_PUBLIC_WALRUS_AGGREGATOR_URL }}
          NEXT_PUBLIC_ENS_RPC_URL: ${{ secrets.NEXT_PUBLIC_ENS_RPC_URL }}
        run: cd apps/web && bun run test:e2e
