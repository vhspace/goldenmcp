# KyberSwap MCP (github.com/KyberNetwork/kyberswap-mcp, locally built stdio), Base (8453).
# Read-only / calldata-building server — never holds keys. Tool names confirmed live
# via tools/list: get-quote (aggregator quote), token-info (metadata + safety).
# get-quote returns top-level {type, tokenIn, tokenOut, ...}; the USDC output amount
# is tokenOut.amount (human-readable decimal, e.g. "1.676068") / tokenOut.amountWei.
expected_path:
  - get-quote
allowed_tools:
  - get-quote
  - token-info
baseline_tokens: 14000
expected_data:
  tokenOut.amount:
    min: 1
    max: 100
policy:
  forbidden_actions:
    - swap-build
    - transfer
