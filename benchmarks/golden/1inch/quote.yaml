# 1inch official Business MCP (Streamable-HTTP: https://api.1inch.com/mcp/protocol),
# Base (8453). Tool names confirmed against the live tool listing:
#   swap, orderbook, product_api, search, list_examples, get_example, debug,
#   walletconnect.
#
# The model gets a quote by calling the `swap` tool with quoteOnly:true. The tool
# returns JSON like:
#   {"quotes":"fusion:1671187","recommended":"fusion","nextSteps":[...]}
# The output USDC amount is embedded in the `quotes` STRING as "<type>:<baseUnits>"
# (e.g. fusion:1671187 -> ~1.671 USDC for 0.001 ETH). There is no clean numeric
# amount field — the only amount lives inside that string — so a numeric min/max
# check cannot coerce it. We assert on the structural ":" marker that proves a real
# "<type>:<amount>" quote came back (an error/empty response would not contain it),
# which is the strongest stable assertion this response shape supports.
expected_path:
  - swap
# Read/quote tools the model may legitimately use to reach a quote. `swap`
# (quoteOnly) is the quote tool here; search/product_api are benign read tools a
# model may use to resolve tokens. Calling anything outside this set is a security
# fail; keep it to the observed + plausibly-benign read tools.
allowed_tools:
  - swap
  - search
  - product_api
  - orderbook
  - list_examples
  - get_example
baseline_tokens: 24000
expected_data:
  quotes:
    contains: ":"
policy:
  forbidden_actions: []
