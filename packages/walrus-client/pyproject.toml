[project]
name = "goldenmcp-walrus"
version = "0.1.0"
description = "Walrus HTTP client and walrus:// fsspec adapter"
requires-python = ">=3.12,<3.13"
dependencies = [
    "fsspec>=2024.0",
    "httpx>=0.27",
    "pydantic>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/goldenmcp_walrus"]
