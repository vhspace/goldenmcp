[project]
name = "goldenmcp-eval-runner"
version = "0.1.0"
description = "HTTP service to trigger Inspect evals for CRE"
requires-python = ">=3.12,<3.13"
dependencies = [
    "fastapi>=0.115",
    "uvicorn>=0.32",
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "inspect-ai>=0.3",
    "openai>=1.0",
    "anthropic>=0.40",
    "goldenmcp-inspect-web3",
    "goldenmcp-walrus",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/goldenmcp_eval_runner"]

[tool.uv.sources]
goldenmcp-inspect-web3 = { workspace = true }
goldenmcp-walrus = { workspace = true }
