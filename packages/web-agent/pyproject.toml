[project]
name = "goldenmcp-web-agent"
version = "0.1.0"
description = "Web concierge agent — Sonnet 4.6, vendor MCPs, marketplace x402"
requires-python = ">=3.12,<3.13"
dependencies = [
    "httpx>=0.27",
    "goldenmcp-inspect-web3",
]

[project.scripts]
goldenmcp-mcp-manifest = "goldenmcp_web_agent.cli:emit_manifest"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/goldenmcp_web_agent"]

[tool.uv.sources]
goldenmcp-inspect-web3 = { workspace = true }
