[project]
name = "goldenmcp-marketplace"
version = "0.1.0"
description = "x402 marketplace MCP server"
requires-python = ">=3.12,<3.13"
dependencies = [
    "fastapi>=0.115",
    "uvicorn>=0.32",
    "httpx>=0.27",
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "goldenmcp-walrus",
    "goldenmcp-identity",
    "web3>=7.0",
]

[project.scripts]
goldenmcp-marketplace = "goldenmcp_marketplace.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/goldenmcp_marketplace"]

[tool.uv.sources]
goldenmcp-walrus = { workspace = true }
goldenmcp-identity = { workspace = true }
